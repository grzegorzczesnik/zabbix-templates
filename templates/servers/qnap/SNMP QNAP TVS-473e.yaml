        - uuid: 578a67faaa304a5a97ddeced542cdc52
          name: 'Physical Drive Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#DRIVENAME},1.3.6.1.4.1.24681.1.4.1.1.1.1.5.2.1.8,{#DRIVESLOT},1.3.6.1.4.1.24681.1.3.11.1.2]'
          key: qnap.drive.discovery
          delay: 1h
          item_prototypes:
            - uuid: 91dc458f609040979f6795491e27c904
              name: '{#DRIVESLOT}: Capacity ({#DRIVENAME})'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.1.5.2.1.9.{#SNMPINDEX}'
              key: 'qnap.drive.capacity[{#DRIVESLOT}]'
              delay: 24h
              units: B
              tags:
                - tag: component
                  value: disk
            - uuid: 3fd9ee90c4d049489a94946b1a4b2600
              name: '{#DRIVESLOT}: Is Global Spare ({#DRIVENAME})'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.1.5.2.1.7.{#SNMPINDEX}'
              key: 'qnap.drive.isspare[{#DRIVESLOT}]'
              delay: 5m
              valuemap:
                name: 'QNAP Global Spare'
              tags:
                - tag: component
                  value: disk
                - tag: scope
                  value: inventory
            - uuid: 0b62d86b43344b548e8582b2f0b236da
              name: '{#DRIVESLOT}: SMART Status Code'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.1.5.2.1.5.{#SNMPINDEX}'
              key: 'qnap.drive.smart.code[{#DRIVESLOT}]'
              delay: 5m
              value_type: FLOAT
              description: ok
              valuemap:
                name: 'QNAP SMART Numeric'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 10m
              tags:
                - tag: component
                  value: disk
                - tag: scope
                  value: health
              trigger_prototypes:
                - uuid: 73a0025140e34b6fbf5305c0d509cbe3
                  expression: 'last(/SNMP QNAP TVS-473e/qnap.drive.smart.code[{#DRIVESLOT}])<>0'
                  name: '{#DRIVESLOT}: Drive Health is NOT Good (Status: {ITEM.LASTVALUE})'
                  priority: HIGH
                  manual_close: 'YES'
                  tags:
                    - tag: component
                      value: disk
                    - tag: scope
                      value: health
                - uuid: 9f6ffdbdc9424cf09620ff33f09f2618
                  expression: 'nodata(/SNMP QNAP TVS-473e/qnap.drive.smart.code[{#DRIVESLOT}],30m)=1'
                  name: '{#DRIVESLOT}: SMART Status is not responding (No data) on {HOST.NAME}'
                  priority: AVERAGE
                  description: |
                    PL: Dysk przestał raportować status SMART przez ostatnie 30 minut. Może to oznaczać zawieszenie agenta SNMP pod obciążeniem I/O lub fizyczne odłączenie/awarię kontrolera dysku.
                    EN: The drive stopped reporting SMART status for the last 30 minutes. This may indicate SNMP agent hang under I/O load or physical drive/controller failure.
                  manual_close: 'YES'
                  dependencies:
                    - name: 'Host is unavailable'
                      expression: 'max(/SNMP QNAP TVS-473e/icmpping,3m)=0'
                    - name: 'SNMP Agent is unreachable on {HOST.NAME}'
                      expression: 'max(/SNMP QNAP TVS-473e/zabbix[host,snmp,available],5m)=0'
                  tags:
                    - tag: component
                      value: disk
                    - tag: scope
                      value: health
            - uuid: e8932b0f317547ce9ac63d19e9261ea4
              name: '{#DRIVESLOT}: SMART Status Text'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.1.5.2.1.4.{#SNMPINDEX}'
              key: 'qnap.drive.smart.text[{#DRIVESLOT}]'
              delay: 1h
              trends: '0'
              description: '{#DRIVESLOT}: SMART Status Text ({#DRIVENAME})'
              valuemap:
                name: 'QNAP Disk Status'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var status = value.trim().toUpperCase();
                      
                      // Stan OK
                      if (status === "GOOD" || status === "OK" || status === "NORMAL" || status === "HEALTHY" || status === "READY") {
                          return 1;
                      }
                      
                      // Ostrzeżenie / Podejrzany stan
                      if (status === "WARNING" || status === "ABNORMAL") {
                          return 2;
                      }
                      
                      // Błąd / Awaria
                      return 0;
              tags:
                - tag: component
                  value: disk
                - tag: scope
                  value: health
            - uuid: 16d0f12d55f04ccaa465ada0e217300e
              name: '{#DRIVESLOT}: Temperature'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.1.5.2.1.6.{#SNMPINDEX}'
              key: 'qnap.drive.temp[{#DRIVESLOT}]'
              delay: 5m
              units: °C
              tags:
                - tag: component
                  value: disk
                - tag: sensor
                  value: temperature
              trigger_prototypes:
                - uuid: d4b183a25384460e84e3b3beb7d5d6d1
                  expression: 'last(/SNMP QNAP TVS-473e/qnap.drive.temp[{#DRIVESLOT}])>{$TEMP.DISK.CRIT}'
                  name: '{#DRIVESLOT}: Temperature is critical ({ITEM.VALUE1} on {HOST.NAME})'
                  priority: HIGH
                  manual_close: 'YES'
                - uuid: 06a89795f37b401784262d52637c566d
                  expression: 'last(/SNMP QNAP TVS-473e/qnap.drive.temp[{#DRIVESLOT}])>{$TEMP.DISK.WARN}'
                  name: '{#DRIVESLOT}: Temperature is high ({ITEM.VALUE1} on {HOST.NAME})'
                  priority: WARNING
                  manual_close: 'YES'
                  dependencies:
                    - name: '{#DRIVESLOT}: Temperature is critical ({ITEM.VALUE1} on {HOST.NAME})'
                      expression: 'last(/SNMP QNAP TVS-473e/qnap.drive.temp[{#DRIVESLOT}])>{$TEMP.DISK.CRIT}'
                - uuid: aac2a06ad888469a99e7d6f449d8e675
                  expression: 'nodata(/SNMP QNAP TVS-473e/qnap.drive.temp[{#DRIVESLOT}],30m)=1'
                  name: '{#DRIVESLOT}: Temperature sensor is not responding (No data)'
                  priority: AVERAGE
                  dependencies:
                    - name: 'Host is unavailable'
                      expression: 'max(/SNMP QNAP TVS-473e/icmpping,3m)=0'
                    - name: 'SNMP Agent is unreachable on {HOST.NAME}'
                      expression: 'max(/SNMP QNAP TVS-473e/zabbix[host,snmp,available],5m)=0'
            - uuid: be4a5c7492cd4817b9c87082fb320e14
              name: '{#DRIVESLOT}: Drive Type'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.1.5.2.1.8.{#SNMPINDEX}'
              key: 'qnap.drive.type[{#DRIVESLOT}]'
              delay: 24h
              value_type: CHAR
              preprocessing:
                - type: REGEX
                  parameters:
                    - '\((.*)\)'
                    - \1
                - type: STR_REPLACE
                  parameters:
                    - SAS
                    - NVMe
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 24h
              tags:
                - tag: component
                  value: disk
                - tag: scope
                  value: inventory
          graph_prototypes:
            - uuid: e71e53f6b5544ea6a5b5b926e0d60c16
              name: '{#DRIVESLOT}: Temperature ({#DRIVENAME})'
              width: '200'
              show_work_period: 'NO'
              show_triggers: 'NO'
              type: PIE
              show_3d: 'YES'
              graph_items:
                - color: 1A7C11
                  calc_fnc: LAST
                  type: GRAPH_SUM
                  item:
                    host: 'SNMP QNAP TVS-473e'
                    key: 'qnap.drive.temp[{#DRIVESLOT}]'
        - uuid: c41a1449d01943ed9f0bef55d33f2020
          name: 'External Drive Discovery (USB/eSATA)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#EXTNAME},1.3.6.1.4.1.24681.1.2.17.1.2]'
          key: qnap.external.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#EXTNAME}'
                value: EXDR
          lifetime: 365d
          enabled_lifetime_type: DISABLE_NEVER
          description: |
            PL: Wykrywa podłączone dyski zewnętrzne (USB/eSATA). Monitoruje status podłączenia oraz zajętość miejsca. Zasoby są usuwane po 365d od odłączenia dysku, aby zachować historię zdarzeń.
            EN: Discovers connected external drives (USB/eSATA). Monitors connection status and space usage. Resources are deleted 365d after disk disconnection to preserve event history.
          item_prototypes:
            - uuid: cbf58d3681ce4406a9992e090bcd90a0
              name: 'USB Drive: Free Space ({#EXTNAME})'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.2.17.1.5.{#SNMPINDEX}'
              key: 'qnap.external.free[{#SNMPINDEX}]'
              delay: 15m
              trends: '0'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      // 1. Usuń wszystkie spacje z tekstu (np. "1.5 TB" -> "1.5TB")
                      var value_clean = value.replace(/\s+/g, '');
                      
                      // 2. Wyciągnij samą jednostkę (wszystko co nie jest cyfrą ani kropką)
                      var unit = value_clean.replace(/[0-9.]/g, '').toUpperCase();
                      
                      // 3. Wyciągnij samą liczbę
                      var num = parseFloat(value_clean);
                      
                      // 4. Jeśli wynik nie jest liczbą, zwróć błąd (zabezpieczenie)
                      if (isNaN(num)) {
                          throw 'Błąd: Wartość nie jest liczbą (' + value + ')';
                      }
                      
                      // 5. Przelicz na bajty w zależności od wykrytej jednostki
                      if (unit === 'TB') {
                          return Math.round(num * 1024 * 1024 * 1024 * 1024);
                      } else if (unit === 'GB') {
                          return Math.round(num * 1024 * 1024 * 1024);
                      } else if (unit === 'MB') {
                          return Math.round(num * 1024 * 1024);
                      } else if (unit === 'KB') {
                          return Math.round(num * 1024);
                      }
                      
                      // Jeśli nie ma jednostki, zakładamy że to już są bajty
                      return Math.round(num);
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: external
                - tag: scope
                  value: capacity
            - uuid: 76601b40aeda4e97b519c43134ff2e60
              name: 'USB Drive: Status ({#EXTNAME})'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.2.17.1.6.{#SNMPINDEX}'
              key: 'qnap.external.status[{#SNMPINDEX}]'
              value_type: CHAR
              tags:
                - tag: component
                  value: external
                - tag: scope
                  value: availability
              trigger_prototypes:
                - uuid: 9c60d52675d64da9b53cd55f1dbc865f
                  expression: 'last(/SNMP QNAP TVS-473e/qnap.external.status[{#SNMPINDEX}])="Ready" and nodata(/SNMP QNAP TVS-473e/qnap.external.status[{#SNMPINDEX}],3m)=0'
                  name: 'External Drive Connected: {#EXTNAME}'
                  priority: INFO
                  manual_close: 'YES'
                - uuid: f80bc5eac1234dee8bccfe2775c437c1
                  expression: |
                    last(/SNMP QNAP TVS-473e/qnap.external.status[{#SNMPINDEX}])<>"Ready" 
                    and 
                    nodata(/SNMP QNAP TVS-473e/qnap.external.status[{#SNMPINDEX}],3m)=0
                  name: 'USB Drive Error: {#EXTNAME} (Status: {ITEM.VALUE})'
                  priority: HIGH
                  manual_close: 'YES'
            - uuid: 2f9356f7ec8c42fd96c5ba74e2538f65
              name: 'USB Drive: Total Size ({#EXTNAME})'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.2.17.1.4.{#SNMPINDEX}'
              key: 'qnap.external.total[{#SNMPINDEX}]'
              delay: 15m
              trends: '0'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      // 1. Usuń wszystkie spacje z tekstu (np. "1.5 TB" -> "1.5TB")
                      var value_clean = value.replace(/\s+/g, '');
                      
                      // 2. Wyciągnij samą jednostkę (wszystko co nie jest cyfrą ani kropką)
                      var unit = value_clean.replace(/[0-9.]/g, '').toUpperCase();
                      
                      // 3. Wyciągnij samą liczbę
                      var num = parseFloat(value_clean);
                      
                      // 4. Jeśli wynik nie jest liczbą, zwróć błąd (zabezpieczenie)
                      if (isNaN(num)) {
                          throw 'Błąd: Wartość nie jest liczbą (' + value + ')';
                      }
                      
                      // 5. Przelicz na bajty w zależności od wykrytej jednostki
                      if (unit === 'TB') {
                          return Math.round(num * 1024 * 1024 * 1024 * 1024);
                      } else if (unit === 'GB') {
                          return Math.round(num * 1024 * 1024 * 1024);
                      } else if (unit === 'MB') {
                          return Math.round(num * 1024 * 1024);
                      } else if (unit === 'KB') {
                          return Math.round(num * 1024);
                      }
                      
                      // Jeśli nie ma jednostki, zakładamy że to już są bajty
                      return Math.round(num);
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 24h
              tags:
                - tag: component
                  value: external
                - tag: scope
                  value: capacity
          trigger_prototypes:
            - uuid: 40023445503547238fc10e61a5ec7428
              expression: '(last(/SNMP QNAP TVS-473e/qnap.external.free[{#SNMPINDEX}]) / last(/SNMP QNAP TVS-473e/qnap.external.total[{#SNMPINDEX}])) * 100 < 10'
