zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 7df96b18c230490a9a0a9e2307226338
      name: Templates
  templates:
    - uuid: a3394d4c34844c4882c9a4c43efc1b1a
      template: 'SNMP QNAP TVS-473e'
      name: 'SNMP QNAP TVS-473e'
      vendor:
        name: 'Grzegorz Cześnik - grzegorz@net59.pl'
        version: '2.0.0'
      groups:
        - name: Templates
      items:
        - uuid: 8d9a89dabcf04643b43a773d88ca55b9
          name: 'ICMP Ping'
          type: SIMPLE
          key: icmpping
          valuemap:
            name: 'Service State'
          tags:
            - tag: component
              value: network
            - tag: scope
              value: availability
          triggers:
            - uuid: 911e37771d4d4cd1ba91dc66b7542ff1
              expression: 'max(/SNMP QNAP TVS-473e/icmpping,3m)=0'
              name: 'Host is unavailable'
              priority: DISASTER
              description: |
                PL: Urządzenie nie odpowiada na ping (ICMP) przez ostatnie 3 minuty. Sprawdź zasilanie oraz fizyczne podłączenie do sieci.
                EN: The device has not responded to ICMP Ping for the last 3 minutes. Check power supply and physical network connection.
        - uuid: 0d270fdc199849bfbc34a26ac6c68858
          name: 'Network: Established TCP Connections'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.6.9.0
          key: net.tcp.established
          description: 'PL: Liczba aktualnie nawiązanych połączeń TCP. Wysoka wartość może wskazywać na duże obciążenie serwera. | EN: Number of currently established TCP connections.'
          tags:
            - tag: component
              value: network
            - tag: scope
              value: performance
        - uuid: 4c9624861fb3445ba1cf89794209f755
          name: 'Service Status: SMB (File Sharing)'
          type: SIMPLE
          key: 'net.tcp.service[tcp,,445]'
          description: 'PL: Status dostępności usługi udostępniania plików (SMB/CIFS) na porcie 445. | EN: Availability status of the SMB/CIFS file sharing service.'
          valuemap:
            name: 'Service State'
          tags:
            - tag: component
              value: application
            - tag: scope
              value: availability
          triggers:
            - uuid: c9aa728c37dc4fcc80e1374adc51bbef
              expression: 'max(/SNMP QNAP TVS-473e/net.tcp.service[tcp,,445],3m)=0'
              name: 'SMB Service is Down on {HOST.NAME}'
              priority: HIGH
              dependencies:
                - name: 'SNMP Agent is unreachable on {HOST.NAME}'
                  expression: 'max(/SNMP QNAP TVS-473e/zabbix[host,snmp,available],5m)=0'
        - uuid: 0b96ee5a3cb04c5ca5c16113972076c0
          name: 'Service Status: QTS Web Interface (Port {$QNAP.WEB.PORT})'
          type: SIMPLE
          key: 'net.tcp.service[tcp,,{$QNAP.WEB.PORT}]'
          description: 'PL: Status dostępności panelu administracyjnego QTS na porcie webowym. | EN: Availability status of the QTS web administration panel.'
          valuemap:
            name: 'Service State'
          tags:
            - tag: component
              value: application
            - tag: scope
              value: availability
          triggers:
            - uuid: ebcad11b61384ef9a8d8572199d4af6a
              expression: 'max(/SNMP QNAP TVS-473e/net.tcp.service[tcp,,{$QNAP.WEB.PORT}],3m)=0'
              name: 'QTS Web Interface is down on {HOST.NAME}'
              opdata: 'Current state: {ITEM.VALUE}'
              priority: AVERAGE
              description: |
                PL: Interfejs WWW QTS nie odpowiada na porcie {$QNAP.WEB.PORT}. Sprawdź, czy usługa nie została zatrzymana lub czy port nie został zablokowany przez firewall.
                EN: QTS Web Interface is not responding on port {$QNAP.WEB.PORT}. Check if the service has stopped or if the port is being blocked by a firewall.
              dependencies:
                - name: 'Host is unavailable'
                  expression: 'max(/SNMP QNAP TVS-473e/icmpping,3m)=0'
                - name: 'SNMP Agent is unreachable on {HOST.NAME}'
                  expression: 'max(/SNMP QNAP TVS-473e/zabbix[host,snmp,available],5m)=0'
              tags:
                - tag: component
                  value: application
                - tag: scope
                  value: availability
        - uuid: c19843af075043eb9bd45ce9ed4e1315
          name: 'CPU Usage'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.2.1.0
          key: qnap.cpu.util
          value_type: FLOAT
          units: '%'
          preprocessing:
            - type: REGEX
              parameters:
                - '^([0-9.]+)'
                - \1
              error_handler: DISCARD_VALUE
          tags:
            - tag: component
              value: cpu
          triggers:
            - uuid: b9169ac83b6944a38d9f79223153af9c
              expression: 'nodata(/SNMP QNAP TVS-473e/qnap.cpu.util,10m)=1'
              name: 'CPU Usage data is not responding (No data) on {HOST.NAME}'
              priority: AVERAGE
              description: |
                PL: Brak danych o zużyciu procesora przez ostatnie 10 minut. Demon SNMP (snmpd) w systemie QTS może być zawieszony z powodu ekstremalnego obciążenia lub braku pamięci.
                EN: No CPU usage data received for the last 10 minutes. The QTS SNMP daemon (snmpd) might be hanging due to extreme load or Out-Of-Memory conditions.
              manual_close: 'YES'
              dependencies:
                - name: 'Host is unavailable'
                  expression: 'max(/SNMP QNAP TVS-473e/icmpping,3m)=0'
                - name: 'SNMP Agent is unreachable on {HOST.NAME}'
                  expression: 'max(/SNMP QNAP TVS-473e/zabbix[host,snmp,available],5m)=0'
            - uuid: 884ae34643ad423b84f53bc31a5107e6
              expression: 'avg(/SNMP QNAP TVS-473e/qnap.cpu.util,10m) > {$CPU.UTIL.CRIT}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'avg(/SNMP QNAP TVS-473e/qnap.cpu.util,10m) < ({$CPU.UTIL.CRIT}-10)'
              name: 'High CPU utilization for 10 minutes on {HOST.NAME}'
              priority: WARNING
              description: |
                PL: Średnie obciążenie procesora przekroczyło zdefiniowany próg {$CPU.UTIL.CRIT}% przez ostatnie 10 minut. Może to być spowodowane intensywnymi operacjami wejścia/wyjścia (I/O), zadaniami kopii zapasowej, przebudową macierzy RAID lub indeksowaniem multimediów. Jeśli stan ten utrzymuje się regularnie, sprawdź "Monitor zasobów" w systemie QTS, aby zidentyfikować obciążający proces.
                EN: Average CPU utilization has exceeded the defined threshold of {$CPU.UTIL.CRIT}% for the last 10 minutes. This may be caused by intensive I/O operations, backup tasks, RAID rebuilding, or multimedia indexing. If this condition persists regularly, check the "Resource Monitor" in QTS to identify the process causing the high load.
              tags:
                - tag: component
                  value: cpu
                - tag: scope
                  value: performance
        - uuid: 05819130190745c09fec6ac817f8ffac
          name: 'CPU Temperature'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.3.5.0
          key: system.cpu.temp
          units: °C
          tags:
            - tag: component
              value: cpu
            - tag: sensor
              value: temperature
          triggers:
            - uuid: e1e31e6bfa184587821d72f50163a8e4
              expression: 'last(/SNMP QNAP TVS-473e/system.cpu.temp)>{$TEMP.CPU.CRIT}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/SNMP QNAP TVS-473e/system.cpu.temp)<({$TEMP.CPU.CRIT}-5)'
              name: 'CPU temperature is high ({ITEM.VALUE1} on {HOST.NAME}'
              priority: WARNING
              description: 'CPU temperature has exceeded the 85 °C threshold. Please check system cooling and load.'
              tags:
                - tag: cause
                  value: overheating
                - tag: component
                  value: CPU
                - tag: scope
                  value: health
            - uuid: b6fbfb0557184bf1adf7f29702b395da
              expression: 'nodata(/SNMP QNAP TVS-473e/system.cpu.temp,10m)=1'
              name: 'CPU Temperature sensor is not responding (No data) on {HOST.NAME}'
              priority: AVERAGE
              description: |
                PL: Brak odczytów z czujnika temperatury procesora przez 10 minut. Weryfikacja stanu termicznego urządzenia jest niemożliwa.
                EN: No readings from the CPU temperature sensor for 10 minutes. Thermal state verification of the device is currently impossible.
              manual_close: 'YES'
              dependencies:
                - name: 'Host is unavailable'
                  expression: 'max(/SNMP QNAP TVS-473e/icmpping,3m)=0'
                - name: 'SNMP Agent is unreachable on {HOST.NAME}'
                  expression: 'max(/SNMP QNAP TVS-473e/zabbix[host,snmp,available],5m)=0'
        - uuid: 97c099eb6d0e4f9ea5c326745e62da25
          name: 'Firmware version'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.1.0
          key: system.fw.version
          delay: 1h
          value_type: TEXT
          inventory_link: OS
          preprocessing:
            - type: REGEX
              parameters:
                - '([0-9.]+)$'
                - \1
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 0e43d4ce56104ec2956de45ab0c3020e
              expression: '(last(/SNMP QNAP TVS-473e/system.fw.version,#1)<>last(/SNMP QNAP TVS-473e/system.fw.version,#2))>0'
              name: 'Firmware version has changed on {HOST.NAME}'
              opdata: 'Previous version: {ITEM.VALUE2}, New version: {ITEM.VALUE1}'
              priority: INFO
              manual_close: 'YES'
              tags:
                - tag: component
                  value: system
                - tag: scope
                  value: audit
        - uuid: dafe38abfaad45cfac51a7a686e513b0
          name: 'System Serial Number'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.1.1.1.1.2.1.4.1
          key: system.hw.serial
          delay: 6h
          value_type: CHAR
          inventory_link: SERIALNO_A
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 24h
          tags:
            - tag: system
              value: inventory
        - uuid: 02da088181d94be18f95fefaabe7187b
          name: 'Model name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.3.12.0
          key: system.model
          delay: 1h
          value_type: CHAR
          inventory_link: MODEL
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 24h
          tags:
            - tag: component
              value: system
        - uuid: 5f92a3121cd44648a3c4391f8bf5d910
          name: 'System temperature'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.3.6.0
          key: system.temp
          units: °C
          description: |
            PL: Statyczny odczyt temperatury płyty głównej. Alarmowanie odbywa się poprzez regułę 'System Component Discovery'.
            EN: Static motherboard temperature reading. Alerting is handled via 'System Component Discovery' rule.
          tags:
            - tag: component
              value: system
            - tag: sensor
              value: temperature
          triggers:
            - uuid: f208b6cb6c13436eb40b161456e7a839
              expression: 'last(/SNMP QNAP TVS-473e/system.temp) > {$TEMP.SYSTEM.CRIT}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/SNMP QNAP TVS-473e/system.temp) < ({$TEMP.SYSTEM.CRIT}-5)'
              name: 'System temperature is high ({ITEM.VALUE1}) on {HOST.NAME}'
              priority: WARNING
            - uuid: ecd4dc9a79324b4ab0d4804bedfde769
              expression: 'nodata(/SNMP QNAP TVS-473e/system.temp,10m)=1'
              name: 'System Temperature sensor is not responding (No data) on {HOST.NAME}'
              priority: AVERAGE
              description: |
                PL: Brak odczytów z czujnika temperatury płyty głównej przez 10 minut. Moduł I2C w urządzeniu QNAP mógł przestać odpowiadać.
                EN: No readings from the motherboard temperature sensor for 10 minutes. The I2C module in the QNAP device might have stopped responding.
              manual_close: 'YES'
              dependencies:
                - name: 'Host is unavailable'
                  expression: 'max(/SNMP QNAP TVS-473e/icmpping,3m)=0'
                - name: 'SNMP Agent is unreachable on {HOST.NAME}'
                  expression: 'max(/SNMP QNAP TVS-473e/zabbix[host,snmp,available],5m)=0'
        - uuid: 6fda5cc4b70c42e99c134f263829788f
          name: 'System uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.25.1.1.0
          key: system.uptime.hw
          units: uptime
          description: 'System uptime (hardware)'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 52aaa77bd24948728e2efeb3aadef54e
              expression: 'last(/SNMP QNAP TVS-473e/system.uptime.hw)<10m'
              name: 'System has been restarted (uptime < 10m)'
              event_name: 'System {HOST.NAME} has been restarted'
              opdata: 'Current uptime: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: |
                PL: Wykryto restart urządzenia (czas pracy < 10 min). Sprawdź logi systemowe QNAP, aby ustalić przyczynę (zanik zasilania, błąd systemu, aktualizacja).
                EN: Device restart detected (uptime < 10 min). Check QNAP system logs to determine the cause (power failure, system crash, update).
              manual_close: 'YES'
              tags:
                - tag: component
                  value: system
                - tag: scope
                  value: availability
        - uuid: 76a0352ea30649d084851721da2d0b58
          name: 'System uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.3.0
          key: system.uptime.network
          status: DISABLED
          units: uptime
          description: 'System uptime (network)'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 343fc9acb99b41c7b006d62e51c72bd3
          name: 'Memory: Free'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.3.3.0
          key: vm.memory.free
          units: B
          tags:
            - tag: component
              value: memory
            - tag: scope
              value: capacity
          triggers:
            - uuid: cce8e754cdcf4db28654b0cbdd2a9f87
              expression: 'nodata(/SNMP QNAP TVS-473e/vm.memory.free,10m)=1'
              name: 'Memory metrics are not responding (No data) on {HOST.NAME}'
              priority: AVERAGE
              description: |
                PL: Brak danych o wolnej pamięci RAM przez 10 minut. Wyliczanie całkowitej utylizacji pamięci (Memory Utilization) zostało wstrzymane.
                EN: No free RAM data received for 10 minutes. Calculation of overall Memory Utilization has been suspended.
              manual_close: 'YES'
              dependencies:
                - name: 'Host is unavailable'
                  expression: 'max(/SNMP QNAP TVS-473e/icmpping,3m)=0'
                - name: 'SNMP Agent is unreachable on {HOST.NAME}'
                  expression: 'max(/SNMP QNAP TVS-473e/zabbix[host,snmp,available],5m)=0'
        - uuid: 4b74319803b0455fbebeead339b1655e
          name: 'Memory: Total'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.3.2.0
          key: vm.memory.total
          units: B
          tags:
            - tag: component
              value: memory
            - tag: scope
              value: capacity
        - uuid: c69a661e9c64460383b2d6c42eb7820b
          name: 'Memory Utilization'
          type: CALCULATED
          key: vm.memory.util
          value_type: FLOAT
          units: '%'
          params: '100 * (last(//vm.memory.total) - last(//vm.memory.free)) / last(//vm.memory.total)'
          tags:
            - tag: component
              value: memory
            - tag: scope
              value: performance
        - uuid: e00c51b1f07248ed81bb557923e2a4b6
          name: 'SNMP Availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          valuemap:
            name: 'Service State'
          tags:
            - tag: component
              value: snmp
            - tag: scope
              value: availability
          triggers:
            - uuid: bc7ebe39d86b451ca1bf6c90d15b757f
              expression: 'max(/SNMP QNAP TVS-473e/zabbix[host,snmp,available],5m)=0'
              name: 'SNMP Agent is unreachable on {HOST.NAME}'
              priority: AVERAGE
              dependencies:
                - name: 'Host is unavailable'
                  expression: 'max(/SNMP QNAP TVS-473e/icmpping,3m)=0'
              tags:
                - tag: component
                  value: snmp
                - tag: scope
                  value: availability
      discovery_rules:
        - uuid: a7dd4c600fdc4f0ba582bfc65b7b7ad6
          name: 'Ethernet Interface Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFNAME},1.3.6.1.2.1.31.1.1.1.1]'
          key: net.if.ethernet.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFNAME}'
                value: '{$NET.IF.IFNAME.MATCHES}'
              - macro: '{#IFNAME}'
                value: '{$NET.IF.IFNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          item_prototypes:
            - uuid: 43286ad796884517847f0791d89d83d4
              name: '{#IFNAME}: Inbound discards'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.13.{#SNMPINDEX}'
              key: 'net.if.in.discards[{#SNMPINDEX}]'
              delay: 5m
              units: discards/s
              preprocessing:
                - type: CHANGE_PER_SECOND
              tags:
                - tag: component
                  value: network
                - tag: scope
                  value: availability
            - uuid: 86ce021782094f41855d3539c234a720
              name: '{#IFNAME}: Inbound errors'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.14.{#SNMPINDEX}'
              key: 'net.if.in.errors[{#SNMPINDEX}]'
              delay: 5m
              units: errors/s
              preprocessing:
                - type: CHANGE_PER_SECOND
              tags:
                - tag: component
                  value: network
                - tag: scope
                  value: availability
            - uuid: ec004657e820470dac6831d70dc0a549
              name: '{#IFNAME}: Inbound utilization'
              type: CALCULATED
              key: 'net.if.in.util[{#SNMPINDEX}]'
              delay: 5m
              value_type: FLOAT
              units: '%'
              params: '100 * last(//net.if.in[{#SNMPINDEX}]) / (last(//net.if.speed[{#SNMPINDEX}]) + (last(//net.if.speed[{#SNMPINDEX}]) = 0))'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'return parseFloat(value).toFixed(2);'
              tags:
                - tag: component
                  value: network
                - tag: scope
                  value: performance
            - uuid: 57591ecb537a46bbbc16c4c88f62bebe
              name: '{#IFNAME}: Incoming traffic'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}'
              key: 'net.if.in[{#SNMPINDEX}]'
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: scope
                  value: availability
            - uuid: e006da1d924b4d2cbeeb0a538891a450
              name: '{#IFNAME}: MAC Address'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.6.{#SNMPINDEX}'
              key: 'net.if.mac[{#SNMPINDEX}]'
              delay: 1h
              value_type: TEXT
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 24h
              tags:
                - tag: component
                  value: network
                - tag: scope
                  value: availability
            - uuid: 833ae113041447cb95976f28c8224141
              name: '{#IFNAME}: Outbound discards'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.19.{#SNMPINDEX}'
              key: 'net.if.out.discards[{#SNMPINDEX}]'
              delay: 5m
              units: discards/s
              preprocessing:
                - type: CHANGE_PER_SECOND
              tags:
                - tag: component
                  value: network
                - tag: scope
                  value: availability
            - uuid: 1f661d7b56094d61b700444f6380b866
              name: '{#IFNAME}: Outbound errors'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.20.{#SNMPINDEX}'
              key: 'net.if.out.errors[{#SNMPINDEX}]'
              delay: 5m
              units: errors/s
              preprocessing:
                - type: CHANGE_PER_SECOND
              tags:
                - tag: component
                  value: network
                - tag: scope
                  value: availability
            - uuid: 2435303d21c24de797c3849c0b68c594
              name: '{#IFNAME}: Outbound utilization'
              type: CALCULATED
              key: 'net.if.out.util[{#SNMPINDEX}]'
              delay: 5m
              value_type: FLOAT
              units: '%'
              params: '100 * last(//net.if.out[{#SNMPINDEX}]) / (last(//net.if.speed[{#SNMPINDEX}]) + (last(//net.if.speed[{#SNMPINDEX}]) = 0))'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'return parseFloat(value).toFixed(2);'
              tags:
                - tag: component
                  value: network
                - tag: scope
                  value: performance
            - uuid: 9155b7fdefc34055b048f410d3889c75
              name: '{#IFNAME}: Outgoing traffic'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.10.{#SNMPINDEX}'
              key: 'net.if.out[{#SNMPINDEX}]'
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: scope
                  value: availability
            - uuid: b6c4d53429ea44128cb6b7648b6eef21
              name: '{#IFNAME}: Interface speed'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.5.{#SNMPINDEX}'
              key: 'net.if.speed[{#SNMPINDEX}]'
              delay: 1h
              units: bps
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              tags:
                - tag: component
                  value: network
                - tag: scope
                  value: availability
              trigger_prototypes:
                - uuid: 1c4b1f71750144a898c98dcd3548f397
                  expression: '(last(/SNMP QNAP TVS-473e/net.if.speed[{#SNMPINDEX}],#1)<>last(/SNMP QNAP TVS-473e/net.if.speed[{#SNMPINDEX}],#2)) and last(/SNMP QNAP TVS-473e/net.if.speed[{#SNMPINDEX}])>0'
                  name: '{#IFNAME}: Interface speed changed (Current: {ITEM.VALUE})'
                  priority: INFO
            - uuid: 530a98996eb54e60b165bd9723089fa8
              name: '{#IFNAME}: Operational status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
              key: 'net.if.status[{#SNMPINDEX}]'
              valuemap:
                name: 'SNMP interface status (ifOperStatus)'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: network
                - tag: scope
                  value: availability
              trigger_prototypes:
                - uuid: 2dc48455f3ce4b28b2aaa57647618c02
                  expression: 'last(/SNMP QNAP TVS-473e/net.if.status[{#SNMPINDEX}])<>1 and last(/SNMP QNAP TVS-473e/net.if.status[{#SNMPINDEX}],#2)=1'
                  name: '{#IFNAME}: Interface is down on {HOST.NAME}'
                  priority: HIGH
                  manual_close: 'YES'
          trigger_prototypes:
            - uuid: d4b5f4ea91974d9e8b88d237b95a4e7e
              expression: 'min(/SNMP QNAP TVS-473e/net.if.in.util[{#SNMPINDEX}],10m)>80 or min(/SNMP QNAP TVS-473e/net.if.out.util[{#SNMPINDEX}],10m)>80'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'max(/SNMP QNAP TVS-473e/net.if.in.util[{#SNMPINDEX}],10m)<70 and max(/SNMP QNAP TVS-473e/net.if.out.util[{#SNMPINDEX}],10m)<70'
              name: '{#IFNAME}: High bandwidth utilization (>80%)'
              priority: WARNING
              manual_close: 'YES'
            - uuid: 5b9ad85b73f8436a9b9effd5ad2c7565
              expression: 'avg(/SNMP QNAP TVS-473e/net.if.in.errors[{#SNMPINDEX}],5m)>0 or avg(/SNMP QNAP TVS-473e/net.if.out.errors[{#SNMPINDEX}],5m)>0'
              name: '{#IFNAME}: High Error Rate (Cable/Switch failure?)'
              priority: HIGH
              description: |
                PL: Na interfejsie sieciowym wykryto błędy pakietów przychodzących lub wychodzących. Zazwyczaj oznacza to uszkodzony kabel Ethernet, wadliwą wtyczkę lub problem z portem na switchu.
                EN: Incoming or outgoing packet errors detected on the network interface. This usually indicates a damaged Ethernet cable, faulty connector, or switch port issue.
              manual_close: 'YES'
          graph_prototypes:
            - uuid: bdbc6bf88e354bab83906930a8955f50
              name: 'Traffic: {#IFNAME}'
              graph_items:
                - drawtype: GRADIENT_LINE
                  color: 1A7C11
                  calc_fnc: ALL
                  item:
                    host: 'SNMP QNAP TVS-473e'
                    key: 'net.if.in[{#SNMPINDEX}]'
                - sortorder: '1'
                  drawtype: BOLD_LINE
                  color: '274482'
                  calc_fnc: ALL
                  item:
                    host: 'SNMP QNAP TVS-473e'
                    key: 'net.if.out[{#SNMPINDEX}]'
        - uuid: c16015298b45412bb36d36ed59986c32
          name: 'System Component Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#COMPNAME},1.3.6.1.4.1.24681.1.4.1.1.1.1.1.2.1.3]'
          key: qnap.component.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#COMPNAME}'
                value: ^(BOOT|USB)$
                operator: NOT_MATCHES_REGEX
          description: |
            PL: Wykrywa obudowy systemowe i komponenty wewnętrzne przy użyciu prywatnego MIB QNAP.
            
            UWAGA: W przypadku głównej jednostki NAS, to wykrywanie może utworzyć item temperatury, który dubluje dane ze statycznego itemu 'System temperature'.
            WAŻNE: Nie wyłączaj tej reguły! Jest ona niezbędna do automatycznego wykrywania podłączonych jednostek rozszerzających (np. TR-004, TL-D800C, seria REXP) oraz monitorowania ich stanu zdrowia i temperatury, które nie są objęte statycznymi OID.
            
            
            EN:Discovers system enclosures and internal components using the QNAP private MIB.
            
            NOTE: For the main NAS unit, this discovery might create a temperature item that duplicates the data from the static 'System temperature' item.
            IMPORTANT: Do not disable this rule! It is essential for automatically detecting connected Expansion Units (e.g., TR-004, TL-D800C, REXP series) and monitoring their individual health and temperature, which are not covered by static OIDs.
          item_prototypes:
            - uuid: 9e9aba0bbcfd41e89957ccfd5b0781a1
              name: '{#COMPNAME}: Serial Number'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.1.1.2.1.4.{#SNMPINDEX}'
              key: 'qnap.component.serial[{#SNMPINDEX}]'
              delay: 12h
              value_type: TEXT
              tags:
                - tag: component
                  value: system
                - tag: scope
                  value: inventory
            - uuid: 774773bee29843f09f0605e4ba35b416
              name: '{#COMPNAME}: Number of Slots'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.1.1.2.1.5.{#SNMPINDEX}'
              key: 'qnap.component.slots[{#SNMPINDEX}]'
              delay: 12h
              tags:
                - tag: component
                  value: system
                - tag: scope
                  value: inventory
            - uuid: 56e2ad3e4545458790ef5b12c6d74c5c
              name: '{#COMPNAME}: Temperature'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.1.1.2.1.7.{#SNMPINDEX}'
              key: 'qnap.component.temp[{#SNMPINDEX}]'
              delay: 5m
              value_type: FLOAT
              units: °C
              description: |
                Discovers system enclosures and internal components using the QNAP private MIB.
                
                NOTE: For the main NAS unit, this discovery might create a temperature item that duplicates the data from the static 'System temperature' item.
                IMPORTANT: Do not disable this rule! It is essential for automatically detecting connected Expansion Units (e.g., TR-004, TL-D800C, REXP series) and monitoring their individual health and temperature, which are not covered by static OIDs.
              preprocessing:
                - type: IN_RANGE
                  parameters:
                    - '0'
                    - '120'
                  error_handler: DISCARD_VALUE
              tags:
                - tag: component
                  value: system
                - tag: sensor
                  value: temperature
              trigger_prototypes:
                - uuid: 1418ccacff2f43c59e3463b5b6bcd0c8
                  expression: 'last(/SNMP QNAP TVS-473e/qnap.component.temp[{#SNMPINDEX}])>{$TEMP.SYSTEM.CRIT}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/SNMP QNAP TVS-473e/qnap.component.temp[{#SNMPINDEX}])<({$TEMP.SYSTEM.CRIT}-5)'
                  name: '{#COMPNAME}: Temperature is high {ITEM.VALUE1} on {HOST.NAME}'
                  priority: WARNING
                  description: 'System component temperature has exceeded the {$TEMP.SYSTEM.CRIT} °C threshold.'
                  manual_close: 'YES'
                  tags:
                    - tag: cause
                      value: overheating
                    - tag: component
                      value: system
                    - tag: scope
                      value: health
                - uuid: cbb1ddc4004f4dcd87d8ef7334874179
                  expression: 'nodata(/SNMP QNAP TVS-473e/qnap.component.temp[{#SNMPINDEX}],30m)=1'
                  name: '{#COMPNAME}: Temperature sensor is not responding (No data) on {HOST.NAME}'
                  priority: AVERAGE
                  description: |
                    PL: Brak odczytu z czujnika temperatury dla wskazanego komponentu/obudowy. Kontroler środowiskowy (Enclosure Management) zawiesił komunikację.
                    EN: No reading from the temperature sensor for the specified component/enclosure. Environmental controller (Enclosure Management) communication hung.
                  manual_close: 'YES'
                  dependencies:
                    - name: 'Host is unavailable'
                      expression: 'max(/SNMP QNAP TVS-473e/icmpping,3m)=0'
                    - name: 'SNMP Agent is unreachable on {HOST.NAME}'
                      expression: 'max(/SNMP QNAP TVS-473e/zabbix[host,snmp,available],5m)=0'
                  tags:
                    - tag: component
                      value: system
                    - tag: scope
                      value: health
          overrides:
            - name: 'Watchdog exclusion for QM2 cards'
              step: '1'
              filter:
                conditions:
                  - macro: '{#COMPNAME}'
                    value: '^QM2.*'
              operations:
                - operationobject: TRIGGER_PROTOTYPE
                  operator: LIKE
                  value: 'Temperature sensor is not responding (No data)'
                  discover: NO_DISCOVER
        - uuid: 6bb378ffbc4e43ed9e4c10de6cfb24da
