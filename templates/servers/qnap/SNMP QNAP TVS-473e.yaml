              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.2.1.2.1.5.{#SNMPINDEX}'
              key: 'qnap.raid.status[{#SNMPINDEX}]'
              delay: 5m
              trends: '0'
              description: |
                un
                1.3.6.1.4.1.24681.1.4.1.1.1.2.1.2.1.5.{#SNMPINDEX}
              valuemap:
                name: 'QNAP RAID Status'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      // 1. Normalizacja wejścia (usuwamy spacje i ujednolicamy wielkość liter)
                      var val = value.trim().toLowerCase();
                      
                      // 2. Mapa statusów tekstowych na liczby (zgodnie ze słownikiem)
                      var statusMap = {
                          "ready": 1,
                          "rebuilding": 2,
                          "scrubbing": 3,
                          "synchronizing": 4,
                          "migrating": 5,
                          "expanding": 6,
                          "initialing": 7,
                          "degraded": 10,
                          "failed": 11,
                          "inactive": 12,
                          "unmounting": 13
                      };
                      
                      // 3. Obsługa wejść numerycznych (dla testów zabbix_sender)
                      if (!isNaN(val) && val !== "") {
                          return parseInt(val);
                      }
                      
                      // 4. Dopasowanie tekstowe (dla danych SNMP)
                      if (statusMap[val] !== undefined) {
                          return statusMap[val];
                      }
                      
                      // 5. Fallback: Jeśli status jest nieznany, zwróć 0 (Error)
                      return 0;
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 10m
              tags:
