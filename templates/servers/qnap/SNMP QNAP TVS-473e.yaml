                    PL: Tablica RAID przestała wysyłać status przez 30 minut. Krytyczne ryzyko "cichej awarii" macierzy. Zabbix nie jest w stanie zweryfikować spójności danych.
                    EN: RAID array stopped sending status for 30 minutes. Critical risk of "silent failure". Zabbix is unable to verify data integrity.
                  manual_close: 'YES'
                  dependencies:
                    - name: 'Host is unavailable'
                      expression: 'max(/SNMP QNAP TVS-473e/icmpping,3m)=0'
                    - name: 'SNMP Agent is unreachable on {HOST.NAME}'
                      expression: 'max(/SNMP QNAP TVS-473e/zabbix[host,snmp,available],5m)=0'
                  tags:
                    - tag: component
                      value: storage
                    - tag: scope
                      value: health
