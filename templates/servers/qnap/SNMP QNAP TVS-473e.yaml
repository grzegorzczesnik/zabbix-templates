                - uuid: 9f0317c4b42c4a99b510cd960341bd3f
                  expression: 'last(/SNMP QNAP TVS-473e/qnap.raid.status[{#SNMPINDEX}])>=2 and last(/SNMP QNAP TVS-473e/qnap.raid.status[{#SNMPINDEX}])<=7'
                  name: 'RAID Group {#RAIDID}: RAID maintenance or synchronization in progress'
